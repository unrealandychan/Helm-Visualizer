{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "webapp.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_PASSWORD: {{ .Values.secret.databasePassword | quote }}
  {{- if .Values.secret.redisPassword }}
  REDIS_PASSWORD: {{ .Values.secret.redisPassword | quote }}
  {{- end }}
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
  API_KEY: {{ .Values.secret.apiKey | quote }}
{{- end }}
